<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Настройки Change Case</title>
  <style>
    body {
      padding: 20px;
      font-family: Segoe UI, sans-serif;
    }

    .row {
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
  <h1>Настройки</h1>
  <div class="row">
    <label>
      <input type="checkbox" id="show-notifications">
      Показывать уведомление после замены
    </label>
  </div>
  <div class="row">
    <p>Хотите изменить горячие клавиши?</p>
    <button id="open-shortcuts">Настроить сочетания клавиш</button>
  </div>
  <button id="save">Сохранить</button>
  <script src="options.js"></script>
</body>

</html>
